name: Generate Snake

on:
  # Run every 12 hours so the snake stays fresh.
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual triggering from the Actions tab.
  workflow_dispatch:
  # Regenerate whenever this workflow is updated.
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/ocean.gif?color_snake=orange&color_dots=#bfd7ff,#218bff,#1f6feb,#8957e5,#ff7b72

      - name: Push generated files to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "chore(snake): regenerate contribution snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
